# DevToolKit 기본 기술 스택 + 아키텍처 + 코드 컨벤션 설정
# PRD에 명시되어 있으면 PRD가 우선.
# 이 파일은 PRD에 없을 때의 기본값(fallback)으로 사용된다.

project:
  name: "conduit-monorepo"
  description: "RealWorld Conduit — Medium 클론 SPA + REST API (TypeScript pnpm 워크스페이스)"
  type: "fullstack"                    # fullstack | frontend | backend | library

tech_stack:
  frontend:
    framework: "react"
    version: "18"                      # 06-architecture §Stack Decision
    language: "typescript"
    build_tool: "vite"
    styling: "bootstrap"               # RealWorld 공식 main.css (Bootstrap-like)
    state_management: "react-context"  # M-FE-AuthCtx — zustand/redux 미도입 (도메인 작음, ADR 시 검토)
    testing: "vitest"
    e2e_testing: "playwright"
    linting: "eslint"                  # ISS-INFRA-02에서 설정
    formatting: "prettier"             # ISS-INFRA-02에서 설정

  backend:
    framework: "express"               # 06-architecture §Stack Decision
    version: "4"
    language: "typescript"
    node_version: "20"
    build_tool: "tsc"
    database: "postgresql"             # prod. dev은 sqlite (ISS-BE-INIT-02에서 양방 지원)
    orm: "prisma"
    cache: "none"
    testing: "vitest"
    api_docs: "none"                   # RealWorld 공식 Postman 컬렉션이 정본

  infrastructure:
    containerization: "docker"
    ci_cd: "github-actions"
    cloud: ""

# ============================================================
# 아키텍처 패턴
# PRD에 아키텍처 요구사항이 있으면 PRD 우선.
# ============================================================
architecture:
  frontend:
    pattern: "pages-components-hooks"  # 12-scaffolding §3 결정 — React 관행
    ui_library: "none"                 # RealWorld 공식 main.css만 (CDN)

  backend:
    pattern: "layered"                 # 12-scaffolding §3 결정 — Routes → Services → Repos → Prisma

# ============================================================
# 코드 컨벤션
# Architect 에이전트가 docs/design/code-conventions.md 생성 시 참조.
# ============================================================
conventions:
  frontend:
    component_style: "function"
    file_naming: "PascalCase"          # 컴포넌트 PascalCase, 유틸/훅 camelCase (11-conventions §3)
    hook_prefix: "use"
    api_client: "fetch"                # M-FE-ApiClient에서 fetch 래퍼 (axios·ky 미도입)
    error_boundary: true
    strict_mode: true

  backend:
    layer_naming:                      # 11-conventions §2 (TypeScript Express layered)
      route: "{domain}Routes"          # 예: userRoutes (routes/users.ts)
      service: "{Domain}Service"       # 예: UserService
      repository: "{Domain}Repo"       # 예: UserRepo
      entity: "{Domain}"               # Prisma 모델명
    exception_handling: "global"       # M-BE-ErrorMapper (errorHandler 미들웨어)
    response_wrapper: "none"           # RealWorld 사양은 raw JSON 응답 (래퍼 없음)
    error_class_prefix:                # 11-conventions §2 표
      validation: "ValidationError"    # 422
      unauthorized: "UnauthorizedError" # 401
      forbidden: "ForbiddenError"      # 403
      not_found: "NotFoundError"       # 404
      conflict: "ConflictError"        # 422 (RealWorld 사양 — 409 미사용)
    validation: "manual"               # 명시 검증 — zod 도입은 ISS-BE-INIT-01 결정
    logging: "pino"                    # JSON 로그 + traceId (R-N-03)

  common:
    git_commit_format: "conventional"  # conventional (feat/fix/chore) | free
    branch_prefix: "feature/"          # feature/ | feat/
    pr_template: true
    code_review: "required"

# ============================================================
# 빌드·실행 명령 (ADR-0027)
# newProject 도입자가 빈 값을 채우거나 11-scaffolding §5와 동기화한다.
# - NEW_PROJECT 흐름: 11-scaffolding §5 산출 후 본 블록에 미러링 (정본은 §5)
# - 기존 프로젝트 도입: 본 블록이 단일 정본 (11-scaffolding 미생성 시)
# /implement, /qa-test 등이 본 블록을 lookup하여 명령 실행
# ============================================================
commands:
  frontend:
    install: "pnpm --filter @conduit/frontend install"
    build: "pnpm --filter @conduit/frontend build"
    test: "pnpm --filter @conduit/frontend test"
    dev: "pnpm --filter @conduit/frontend dev"
    lint: "pnpm --filter @conduit/frontend lint"
    typecheck: "pnpm --filter @conduit/frontend typecheck"
  backend:
    install: "pnpm --filter @conduit/backend install"
    build: "pnpm --filter @conduit/backend build"
    test: "pnpm --filter @conduit/backend test"
    run: "pnpm --filter @conduit/backend dev"     # devkit dev backend → tsx watch
    lint: "pnpm --filter @conduit/backend lint"
  e2e: "pnpm --filter @conduit/e2e test"

collaboration:
  vcs: "github"                        # 필수
  branching_strategy: "gitflow"        # gitflow | trunk-based | github-flow
  code_review: "required"

agent:
  team_size: 3                         # 3~5 권장
  parallel_tasks: true
  safety_guard: true                   # /careful 상시 활성화
  # teammate_mode는 .claude/settings.json의 teammateMode에서 설정
